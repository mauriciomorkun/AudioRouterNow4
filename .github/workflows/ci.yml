name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  swift-test:
    name: swift-test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (Swift 6 / swift-testing)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Run AudioRouterKit tests
        run: swift test --package-path AudioRouterKit

  xcode-build-test:
    name: xcode-build-test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (Swift 6 / swift-testing)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build and test app target
        run: >
          xcodebuild
          -project AudioRouterNow4.xcodeproj
          -scheme AudioRouterNow4
          build test
          CODE_SIGN_IDENTITY=- CODE_SIGNING_REQUIRED=NO
